search_queries:

  # -- Netherlands job boards --

  - name: LinkedIn NL — AI Innovation Lab
    query: 'site:linkedin.com/jobs "Innovation Lab" OR "AI Lab" OR "Learning Innovation" Netherlands OR Amsterdam OR remote'
    enabled: true

  - name: LinkedIn NL — Applied AI Program Manager
    query: 'site:linkedin.com/jobs "Applied AI" OR "AI Transformation" OR "AI Program Manager" Netherlands OR Amsterdam OR remote EU'
    enabled: true

  - name: LinkedIn NL — Digital Transformation Lead
    query: 'site:linkedin.com/jobs "Digital Transformation" OR "AI Adoption" OR "AI Enablement" Lead OR Manager Netherlands remote'
    enabled: true

  - name: Indeed NL — Innovation Manager
    query: 'site:indeed.com "Innovation Manager" OR "Innovation Lab" OR "R&D Lead" Netherlands OR Amsterdam OR remote'
    enabled: true

  - name: Werken.nl — Innovatie
    query: 'site:werken.nl "Innovatie" OR "AI" OR "Programmamanager" OR "Projectleider AI"'
    enabled: true

  - name: Nationale Vacaturebank — AI Innovation
    query: 'site:nationalevacaturebank.nl "AI" OR "Innovatie" OR "Leren" "Lead" OR "Manager" Netherlands'
    enabled: true

  # -- European boards --

  - name: Remotive — AI Transformation EU
    query: 'site:remotive.com "AI Transformation" OR "Innovation Lab" OR "Learning Innovation" OR "Applied AI" Europe'
    enabled: true

  - name: WeWorkRemotely — AI Innovation Lead
    query: 'site:weworkremotely.com "AI" "Innovation" OR "Learning" OR "Lab" OR "Transformation" Lead OR Manager'
    enabled: true

  - name: Himalayas — Applied AI EU
    query: 'site:himalayas.app "Applied AI" OR "AI Innovation" OR "Transformation" OR "Innovation Lab" Europe'
    enabled: true

  - name: YC Jobs — Applied AI Education
    query: 'site:workatastartup.com "Applied AI" OR "Innovation Lab" OR "AI Education" OR "Learning" remote Europe'
    enabled: true

  - name: HN Who's Hiring — EU AI Innovation
    query: 'site:news.ycombinator.com "AI" "Innovation" OR "Education" OR "Lab" OR "Learning" remote Europe Netherlands'
    enabled: true

  # -- Sustainability / Greentech --

  - name: Climatejobs — Innovation Lead
    query: 'site:climatejobs.nl OR site:climatebase.org "Innovation" OR "AI" OR "Program Manager" remote Netherlands'
    enabled: true

  - name: Green Jobs — AI Sustainability EU
    query: '"AI" "Sustainability" OR "Greentech" OR "ESG" "Lead" OR "Manager" OR "Innovation" remote Europe'
    enabled: true

  # -- DACH market --

  - name: DACH — AI Innovation Lab
    query: '"Innovation Lab" OR "KI Lab" OR "AI Lab" "Lead" OR "Manager" Germany OR Austria OR Switzerland OR remote DACH'
    enabled: true

  - name: DACH — AI Transformation
    query: '"KI Transformation" OR "AI Transformation" OR "Digitale Transformation" Lead OR Manager remote Germany'
    enabled: true

  - name: Greenhouse DACH — Innovation
    query: 'site:job-boards.greenhouse.io "Innovation Lab" OR "Applied AI" OR "AI Program Manager" remote EU'
    enabled: true

  - name: Ashby EU — AI Program
    query: 'site:jobs.ashbyhq.com "AI" OR "Innovation" "Program" OR "Lead" OR "Manager" Germany OR Netherlands OR remote Europe'
    enabled: true

  # -- Education / EdTech --

  - name: EdTech — Learning Innovation
    query: '"Learning Innovation" OR "AI Education" OR "EdTech" Lead OR Manager remote Europe Netherlands'
    enabled: true

  - name: Universities NL — AI Lab
    query: '"Innovation Lab" OR "Applied Research" OR "Lectoraat" AI Netherlands universiteit OR hogeschool'
    enabled: true

